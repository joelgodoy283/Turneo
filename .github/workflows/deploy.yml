name: Deploy a VPS

# Cada push a main (y el botón "Run workflow") despliega en el VPS por SSH.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar el VPS por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            for env_file in /docker/turneo/.env /docker/turneo/app/.env; do
              if [ -f "$env_file" ]; then
                sed -i '/^SUPABASE_URL=/d; /^SUPABASE_SECRET_KEY=/d' "$env_file"
              fi
            done
            cd /docker/turneo/app
            git pull origin main
            cd /docker/turneo
            docker compose up -d --build turneo
            docker image prune -f
