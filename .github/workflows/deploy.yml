name: Deploy a VPS

# Cada push a main (y el botón "Run workflow") despliega en el VPS por SSH.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Actualizar el VPS por SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ~/Turneo
            git pull origin main
            npm install --omit=dev
            pm2 restart turneo || pm2 start server.js --name turneo
            pm2 save
